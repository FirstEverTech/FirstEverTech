name: Update Supporters

on:
  push:
    paths:
      - 'assets/SUPPORTERS.txt'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update all repos
        env:
          PAT: ${{ secrets.SUPPORTERS_PAT }}
        run: |
          python3 << 'EOF'
          import os, re, subprocess

          pat = os.environ['PAT']
          org = 'FirstEverTech'

          with open('assets/SUPPORTERS.txt') as f:
              names = [l.strip() for l in f if l.strip()]

          block = "<!-- SUPPORTERS_START -->\n" + \
                  "- " + ", ".join(names) + \
                  "\n<!-- SUPPORTERS_END -->"

          repos = [
              org,
              'Universal-Intel-Chipset-Updater',
              'Universal-Intel-WiFi-BT-Updater',
              'Adobe-AVX2-Patch',
          ]

          for repo in repos:
              clone_dir = f"clone_{repo}"
              url = f"https://x-access-token:{pat}@github.com/{org}/{repo}.git"
              subprocess.run(['git', 'clone', '--depth=1', url, clone_dir], check=True)

              path = f"{clone_dir}/README.md"
              with open(path) as f:
                  content = f.read()

              updated = re.sub(
                  r'<!-- SUPPORTERS_START -->.*?<!-- SUPPORTERS_END -->',
                  block, content, flags=re.DOTALL
              )

              if updated == content:
                  print(f"{repo}: no changes")
                  continue

              with open(path, 'w') as f:
                  f.write(updated)

              for cmd in [
                  ['git', '-C', clone_dir, 'config', 'user.email', 'actions@github.com'],
                  ['git', '-C', clone_dir, 'config', 'user.name', 'GitHub Actions'],
                  ['git', '-C', clone_dir, 'add', 'README.md'],
                  ['git', '-C', clone_dir, 'commit', '-m', 'chore: update supporters'],
                  ['git', '-C', clone_dir, 'push'],
              ]:
                  subprocess.run(cmd, check=True)
               print(f"{repo}: updated")
          EOF
